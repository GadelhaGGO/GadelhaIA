        body.dark-mode .input-container { background-color: #1e1f20; border-color: #2d2f31; }
        body.dark-mode .bot-icon-box { background-color: #2d2f31; border-color: #424447; }

        body.light-mode #dropdownMenu, body.light-mode #historyDrawer { background-color: #ffffff; border-color: #dee2e6; }

        body.light-mode .user-msg { background-color: #e3e3e3; color: #1f1f1f; }

        const chatContainer = document.getElementById('chatContainer');

        const plus100Container = document.getElementById('plus100Container');
        const plusArrow = document.getElementById('plusArrow');

        let chatHistory = [];
        let isTyping = false;

        fullDatabase.forEach((item, index) => {
            const num = index + 1;
            const btn = document.createElement('button');
            btn.className = "w-full text-left px-4 py-1.5 text-xs hover:bg-gray-500/10 rounded transition-colors truncate flex items-center gap-1.5";

            if (isTyping) return;
            chatMessages.innerHTML = '';
            chatMessages.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            historyDrawer.classList.add('-translate-x-full');
            drawerOverlay.classList.add('hidden');
        }

            historyDrawer.classList.remove('-translate-x-full');
            drawerOverlay.classList.remove('hidden');
        });

            historyDrawer.classList.add('-translate-x-full');
            drawerOverlay.classList.add('hidden');
        });

            e.stopPropagation();
            plus100Container.classList.toggle('hidden');

            plusArrow.classList.toggle('fa-chevron-up');
        }

        function triggerMenuAction(text) {
            userInput.value = text;
            dropdownMenu.classList.add('hidden');
            handleSend();
        }

        function getBotResponse(message) {
            const cleanMsg = message.toLowerCase().trim();
            
            // 🆕 Comando /comandos - lista perguntas ocultas (não presentes no +100)
            if (cleanMsg === '/comandos' || cleanMsg === '/commands') {
                let lista = '📋 **Comandos ocultos (perguntas que não estão no menu +100):**\n\n';
                lista += '🔹 **Conversas informais:**\n';
                conversationalDatabase.forEach((item, idx) => {
                    lista += `   ${idx+1}. ${item.q}\n`;
                });
                lista += '\n🔹 **Palavras-chave especiais:**\n';
                extraKeysToShow.forEach(key => {
                    // Exibe a chave como exemplo
                    lista += `   • ${key}\n`;
                });
                lista += '\n💡 Digite qualquer uma dessas perguntas ou palavras-chave para receber uma resposta personalizada!';
                return lista;
            }

            const matchConv = conversationalDatabase.find(item => {
                const trigger = item.q.toLowerCase().trim();
                return cleanMsg === trigger || cleanMsg.includes(trigger);
            });
            if (matchConv) return matchConv.a;

            const matchedObj = fullDatabase.find(item => item.q.toLowerCase().trim() === cleanMsg || cleanMsg.includes(item.q.toLowerCase().trim()));
            if (matchedObj) return matchedObj.a;

            if (cleanMsg.match(/(quem e voce|quem e vc)/)) return fullDatabase[0].a;
            if (cleanMsg.match(/(formacao|estudou|faculdade)/)) return fullDatabase[1].a;
            if (cleanMsg.match(/(profissao|trabalha com o que|operador de trem)/)) return fullDatabase[2].a;
            if (cleanMsg.match(/(hobby|hobbies|esportes|luta|futebol)/)) return fullDatabase[19].a;

            if (cleanMsg.match(/(namora|namorada|namorado|comprometido)/)) return extraKnowledge.namoro;
            if (cleanMsg.match(/(como vai|tudo bem|tudo bom|como voce esta)/)) return extraKnowledge.comoVai;
            if (cleanMsg.match(/(mora|onde voce mora)/)) return extraKnowledge.mora;
            if (cleanMsg.match(/(time|torce|corinthians|timao)/)) return extraKnowledge.time;
            if (cleanMsg === 'mulher' || cleanMsg === 'mulheres') return extraKnowledge.mulher;
            if (cleanMsg.match(/(viado|bicha|boiola|gay)/)) return extraKnowledge.antipreconceito;
            if (cleanMsg.match(/(gosta de fazer|o que gosta)/)) return extraKnowledge.gosta;
            if (cleanMsg.match(/(chato|chata)/)) return extraKnowledge.chato;
            if (cleanMsg.match(/(se acha)/)) return extraKnowledge.seAcha;
            if (cleanMsg.match(/(jogador caro|jogadora cara)/)) return extraKnowledge.jogadorCaro;
            if (cleanMsg.match(/(real motiva|realmotiva)/)) return extraKnowledge.realMotiva;
            if (cleanMsg === 'deus') return extraKnowledge.deus;
            if (cleanMsg === 'jesus') return extraKnowledge.jesus;
            if (cleanMsg.match(/(idolo|ídolo|ney|ronaldo)/)) return extraKnowledge.idolo;
            if (cleanMsg.match(/(fa|fã|sou seu)/)) return extraKnowledge.fa;
            
            return extraKnowledge.padrao;
        }

        function typeWriterEffect(element, text, speed = 12) {
            isTyping = true;
            let i = 0;
            element.textContent = '';
            
            let scrollRAF;
            
            function type() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    
                    if (!scrollRAF) {
                        scrollRAF = requestAnimationFrame(() => {
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                            scrollRAF = null;
                        });
                    }
                    
                    setTimeout(type, speed);
                } else {
                    isTyping = false;
                }
            }
            type();
        }

        function updateHistory(text) {
            if (chatHistory.includes(text)) return; 
            chatHistory.unshift(text);
            if (chatHistory.length > 10) chatHistory.pop();
            
            historyList.innerHTML = '';
            chatHistory.forEach(item => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-3 py-2 text-sm text-[#9aa0a6] hover:bg-gray-500/10 rounded-lg transition-colors truncate mb-1";
                btn.innerHTML = `<i class="fa-regular fa-comment mr-2 text-xs"></i> ${item}`;
                btn.onclick = () => {
                    userInput.value = item;
                    handleSend();
                    closeDrawer.click();
                };
                historyList.appendChild(btn);
            });
        }

        function appendMessage(sender, text) {
            if (chatMessages.classList.contains('hidden')) {
                welcomeScreen.classList.add('hidden');
                chatMessages.classList.remove('hidden');
                chatMessages.classList.add('flex');
            }

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'} w-full animate-fade-in`;
            
            if (sender === 'user') {
                msgDiv.innerHTML = `<div class="user-msg max-w-[85%] rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm shadow-sm select-text">${text}</div>`;
                chatMessages.appendChild(msgDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } else {
                msgDiv.innerHTML = `
                    <div class="flex items-start gap-2.5 max-w-[90%]">
                        <div class="bot-icon-box w-7 h-7 rounded-lg border flex items-center justify-center text-xs text-[#a8c7fa] shrink-0 mt-0.5"><i class="fa-solid fa-soccer-ball"></i></div>
                        <div class="text-sm leading-relaxed pt-1 select-text whitespace-pre-line text-target"></div>
                    </div>`;
                chatMessages.appendChild(msgDiv);
                const targetTextContainer = msgDiv.querySelector('.text-target');
                typeWriterEffect(targetTextContainer, text);
            }
        }

        function handleSend() {
            if (isTyping) return;
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage('user', text);
            updateHistory(text);
            userInput.value = '';
            setTimeout(() => {
                const botReply = getBotResponse(text);
                appendMessage('bot', botReply);
            }, 400);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
